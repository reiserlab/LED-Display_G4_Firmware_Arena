[workspace]
authors = ["Frank Loesche <loeschef@janelia.hhmi.org>"]
channels = ["conda-forge"]
name = "G4.1-ArenaSlim"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
deploy = "pio run -e teensy41 -t upload"
deploy-printf = "pio run -e teensy41-printf -t upload"
monitor = "mkdir -p log && bash -c 'pio device monitor -e teensy41 2>&1 | tee \"log/$(date +%Y%m%d_%H%M%S).log\"'"

[dependencies]
platformio = ">=6.1.19,<7"
